<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Code Translator</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- PrismJS for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Animated Background Shapes -->
    <div class="bg-decorations">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="gradient-text">Code</span>Translator
                <span class="badge">Offline Engine</span>
            </div>
            <p class="subtitle">Instantly translate logic between Python, Java, and C++ with AST & Regex.</p>
        </header>

        <main class="translator-workspace">
            <!-- Left Panel: Input -->
            <div class="panel input-panel glass-panel">
                <div class="panel-header">
                    <div class="language-selector">
                        <label for="source-lang">Source</label>
                        <select id="source-lang" class="glass-select">
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="c++">C++</option>
                        </select>
                    </div>
                    <button id="btn-sample" class="btn btn-secondary glass-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Load Sample
                    </button>
                </div>
                <div class="editor-container">
                    <textarea id="source-code" spellcheck="false" placeholder="Paste your source code here..."></textarea>
                </div>
            </div>

            <!-- Middle: Action -->
            <div class="action-panel">
                <button id="btn-translate" class="btn btn-primary glow-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <span>Translate</span>
                </button>
            </div>

            <!-- Right Panel: Output -->
            <div class="panel output-panel glass-panel">
                <div class="panel-header">
                    <div class="language-selector">
                        <label for="target-lang">Target</label>
                        <select id="target-lang" class="glass-select">
                            <option value="java">Java</option>
                            <option value="python">Python</option>
                            <option value="c++">C++</option>
                        </select>
                    </div>
                    <button id="btn-copy" class="btn btn-secondary glass-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy
                    </button>
                </div>
                <div class="editor-container">
                    <pre><code id="target-code" class="language-java">Translation will appear here...</code></pre>
                </div>
            </div>
        </main>
        
        <div id="error-toast" class="toast hidden"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="/static/script.js?v=2"></script>
</body>
</html>
